<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><title>Payment Failed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body class="container py-5">
  <div class="alert alert-danger shadow">
    <h4 class="alert-heading">Payment Failed</h4>
    <p>Your booking could not be completed.</p>
    <p>Order ID stored: {{ booking.payment_id }}</p>
    <a class="btn btn-secondary" href="{% url 'appointments:book_package' booking.package.slug %}">Try Again</a>
    <a class="btn btn-primary" href="{% url 'appointments:hospital_packages_list' %}">Back to Packages</a>
  </div>
</body></html>
