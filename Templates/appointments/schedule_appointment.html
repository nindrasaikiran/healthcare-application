{% extends "base.html" %}
{% load static %}

{% block title %}Schedule New Appointment{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Schedule New Appointment</h2>
        <a href="{% url 'appointments:appointments_list' %}" class="btn btn-secondary">Back to Schedule</a>
    </div>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form method="post" action="{% url 'appointments:schedule_appointment' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Doctor</label>
                            <select class="form-select" name="doctor_name" required>
                                <option value="">Select a Doctor</option>
                                {% for doctor in doctors %}
                                    <option value="{{ doctor.name }}">{{ doctor.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Patient</label>
                            <select class="form-select" name="patient_name" required>
                                <option value="">Select a Patient</option>
                                {% for patient in patients %}
                                    <option value="{{ patient.name }}">{{ patient.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" name="appointment_date" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Start Time</label>
                            <input type="time" name="start_time" class="form-control" required>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary">Schedule Appointment</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>


    </div>
</div>
{% endblock %}
