{% extends "base.html" %}

{% block title %}Edit Appointment{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Edit Appointment</h2>
        <a href="{% url 'appointments:appointments_list' %}" class="btn btn-secondary">Back to Appointments</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="post" action="{% url 'appointments:edit_appointment' appointment.id %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="doctor" class="form-label">Doctor</label>
                            <select class="form-select" id="doctor" name="doctor_name" required>
                                <option value="">Select a Doctor</option>
                                {% for doctor in doctors %}
                                    <option value="{{ doctor.name }}" {% if doctor.name == appointment.doctor_name %}selected{% endif %}>
                                        Dr. {{ doctor.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="patient" class="form-label">Patient</label>
                            <select class="form-select" id="patient" name="patient_name" required>
                                <option value="">Select a Patient</option>
                                {% for patient in patients %}
                                    <option value="{{ patient.name }}" {% if patient.name == appointment.patient_name %}selected{% endif %}>
                                        {{ patient.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="appointment_date" class="form-label">Date</label>
                            <input type="date" class="form-control" id="appointment_date" name="appointment_date" value="{{ appointment.start_time|date:'Y-m-d' }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="start_time" class="form-label">Start Time</label>
                            <input type="time" class="form-control" id="start_time" name="start_time" value="{{ appointment.start_time|date:'H:i' }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select name="status" id="status" class="form-select">
                                <option value="0" {% if appointment.status == 0 %}selected{% endif %}>Requested</option>
                                <option value="1" {% if appointment.status == 1 %}selected{% endif %}>Scheduled Appointment</option>
                                <option value="2" {% if appointment.status == 2 %}selected{% endif %}>Completed</option>
                                <option value="3" {% if appointment.status == 3 %}selected{% endif %}>Cancelled</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
