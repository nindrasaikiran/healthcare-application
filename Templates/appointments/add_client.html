<!DOCTYPE html>
<html>
<head>
    <title>Add Client</title>
</head>
<body>
    <h2>Add Client</h2>
    <form method="post">
        {% csrf_token %}
        <label>Name:</label>
        <input type="text" name="name" required><br><br>

        <label>Email:</label>
        <input type="email" name="email" required><br><br>

        <label>Phone:</label>
        <input type="text" name="phone"><br><br>

        <button type="submit">Add Client</button>
    </form>
</body>
</html>
