
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hospital Appointment System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            /* Animated hospital-themed gradient (blue + green) */
            background: linear-gradient(135deg, #43cea2, #185a9d, #9be15d);
            background-size: 300% 300%;
            animation: gradientShift 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            background: #ffffff;
            padding: 30px; /* smaller padding */
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 350px; /* reduced from 400px */
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            color: #2a5298;
        }

        p.subtitle {
            color: #555;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .social-btn img {
            width: 18px;
            margin-right: 8px;
        }

        .social-btn:hover {
            background: #f0f8ff;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 15px 0;
            color: #aaa;
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ddd;
        }

        .divider:not(:empty)::before {
            margin-right: 0.75em;
        }

        .divider:not(:empty)::after {
            margin-left: 0.75em;
        }

        .form-group {
            text-align: left;
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #43cea2;
            outline: none;
        }

        .extra-options {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .extra-options a {
            color: #185a9d;
            text-decoration: none;
        }

        .extra-options a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(135deg, #3bb995, #144c84);
        }

        .register-text {
            font-size: 0.85rem;
            margin-top: 12px;
        }

        .register-text a {
            color: #185a9d;
            text-decoration: none;
        }

        .register-text a:hover {
            text-decoration: underline;
        }

        .message {
            color: red;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Log in to HospitalApp</h1>
    <p class="subtitle">Welcome back! Please login with your registered credentials</p>

    {% if messages %}
        <div class="message">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </div>
    {% endif %}

    <div class="social-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Google_%22G%22_Logo.svg">
        Login with Google
    </div>
    <div class="social-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png">
        Login with Facebook
    </div>

    <div class="divider">or</div>

<form method="post" action="{% url 'appointments:login' %}{% if next %}?next={{ next|urlencode }}{% endif %}">
    {% csrf_token %}
        <div class="form-group">
            <label>Email</label>
            <input type="text" name="username" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="extra-options">
            <label><input type="checkbox" name="remember"> Remember me</label>
            <a href="">Forgot your password?</a>
        </div>

        <button type="submit">LOGIN</button>
    </form>

    <p class="register-text">
        Don’t have an account? <a href="{% url 'appointments:register' %}">Register</a>
    </p>
</div>

</body>
</html>
